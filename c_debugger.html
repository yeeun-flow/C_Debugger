<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C 제어문 디버거</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══ DARK THEME (기본) ═══ */
:root,
[data-theme="dark"] {
  --bg:       #0b0d14;
  --bg2:      #10131e;
  --bg3:      #141828;
  --sidebar:  #0d1020;
  --panel:    #13182a;
  --panel2:   #181f35;
  --border:   #1e2640;
  --border2:  #28345a;
  --accent:   #5b9cf6;
  --accent-g: #43d9ad;
  --accent-r: #f47067;
  --accent-y: #f0c040;
  --accent-p: #b77dff;
  --accent-o: #f7965a;
  --text:     #cdd6f4;
  --text2:    #7d8ab0;
  --text3:    #3d4a6a;
  --hl-line:  rgba(91,156,246,0.13);
  --hl-exec:  rgba(67,217,173,0.18);
  --hl-skip:  rgba(244,112,103,0.10);
  --kw:  #c792ea;
  --ty:  #82aaff;
  --st:  #c3e88d;
  --nm:  #f78c6c;
  --cm:  #546e7a;
  --fn:  #82aaff;
  --vr:  #f0c040;
  --pp:  #89ddff;
  --right-pane-width: 380px;
}

/* ═══ LIGHT THEME ═══ */
[data-theme="light"] {
  --bg:       #f8f9fc;
  --bg2:      #eef1f8;
  --bg3:      #e4e8f2;
  --sidebar:  #e8ecf4;
  --panel:    #f0f3f9;
  --panel2:   #e4e8f2;
  --border:   #d1d8e4;
  --border2:  #c4ccda;
  --accent:   #2563eb;
  --accent-g: #059669;
  --accent-r: #dc2626;
  --accent-y: #b45309;
  --accent-p: #7c3aed;
  --accent-o: #ea580c;
  --text:     #1e293b;
  --text2:    #475569;
  --text3:    #94a3b8;
  --hl-line:  rgba(37,99,235,0.12);
  --hl-exec:  rgba(5,150,105,0.15);
  --hl-skip:  rgba(220,38,38,0.1);
  --kw:  #7c3aed;
  --ty:  #2563eb;
  --st:  #15803d;
  --nm:  #c2410c;
  --cm:  #64748b;
  --fn:  #2563eb;
  --vr:  #b45309;
  --pp:  #0ea5e9;
}
* { margin:0; padding:0; box-sizing:border-box; }

html, body { height:100%; overflow:hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  flex-direction: column;
}

/* ═══ TOPBAR ═══ */
.topbar {
  height: 44px;
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 100;
}
.topbar-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.topbar-logo span { color: var(--accent-g); }
.topbar-sep { width: 1px; height: 20px; background: var(--border); }
.topbar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 1px;
}
.topbar-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
}
.topbar-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  background: rgba(91,156,246,0.12);
  color: var(--accent);
  border: 1px solid rgba(91,156,246,0.25);
}

/* theme toggle */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--panel2);
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.theme-toggle:hover {
  background: var(--panel);
  color: var(--text);
  border-color: var(--accent);
}
.theme-toggle-icon { font-size: 14px; }

/* ═══ LAYOUT ═══ */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: 228px;
  flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 12px 14px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-scroll { overflow-y: auto; flex: 1; padding: 6px 0; }
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); }

.sidebar-group { margin-bottom: 4px; }
.sidebar-group-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  padding: 8px 14px 4px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.sidebar-item:hover { background: rgba(255,255,255,0.04); }
[data-theme="light"] .sidebar-item:hover { background: rgba(0,0,0,0.04); }
.sidebar-item.active {
  background: rgba(91,156,246,0.1);
}
.sidebar-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent);
}
.sidebar-item-icon {
  font-size: 13px;
  min-width: 18px;
  text-align: center;
}
.sidebar-item-info { flex: 1; min-width: 0; }
.sidebar-item-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-item.active .sidebar-item-name { color: var(--accent); }
.sidebar-item-sub {
  font-size: 10px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-item-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
}
.sidebar-item.done .sidebar-item-dot { background: var(--accent-g); }
.sidebar-item.active .sidebar-item-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

/* sub-items */
.sidebar-subitem {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 14px 5px 36px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.sidebar-subitem:hover { background: rgba(255,255,255,0.03); }
[data-theme="light"] .sidebar-subitem:hover { background: rgba(0,0,0,0.03); }
.sidebar-subitem.active { background: rgba(91,156,246,0.08); }
.sidebar-subitem.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent-g);
}
.sidebar-subitem-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
}
.sidebar-subitem.active .sidebar-subitem-name { color: var(--accent-g); }
.sidebar-subitem-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  margin-left: auto;
}

/* ═══ MAIN AREA ═══ */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ═══ TAB BAR ═══ */
.tab-bar {
  height: 36px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  overflow-x: auto;
}
.tab-bar::-webkit-scrollbar { height: 0; }
.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  border-right: 1px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  position: relative;
}
.tab.active {
  color: var(--text);
  background: var(--bg3);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
}
.tab-dot { width: 7px; height: 7px; border-radius: 50%; }

/* ═══ CONTENT SPLIT ═══ */
.content-split {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}
.editor-pane {
  flex: 1;
  min-width: 200px;
}
.right-pane {
  width: var(--right-pane-width, 380px);
  min-width: 280px;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg2);
}

/* ═══ RESIZER ═══ */
.resizer {
  flex-shrink: 0;
  background: var(--border);
  transition: background 0.15s;
}
.resizer:hover, .resizer.active {
  background: var(--accent);
}
.resizer-v {
  width: 4px;
  cursor: col-resize;
}
.resizer-v:hover { width: 6px; margin: 0 -1px; }
.resizer-h {
  height: 4px;
  cursor: row-resize;
  flex-shrink: 0;
}
.resizer-h:hover { height: 6px; margin: 2px 0; }

.resizable-panel {
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.resizable-panel .info-panel-body {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* ═══ EDITOR PANE ═══ */
.editor-pane {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.pane-header {
  height: 32px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}
.pane-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text3);
  text-transform: uppercase;
}
.pane-title-accent { color: var(--text2); }

.code-area {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  background: var(--bg);
}
.code-area::-webkit-scrollbar { width: 4px; }
.code-area::-webkit-scrollbar-thumb { background: var(--border2); }

.code-line {
  display: flex;
  align-items: stretch;
  min-height: 24px;
  transition: background 0.15s;
  position: relative;
}
.code-line.hl-exec  { background: var(--hl-exec); }
.code-line.hl-skip  { background: var(--hl-skip); }
.code-line.hl-next  { background: var(--hl-line); }

.line-gutter {
  width: 48px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 12px;
  gap: 6px;
}
.line-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  user-select: none;
  min-width: 20px;
  text-align: right;
}
.code-line.hl-exec .line-num  { color: var(--accent-g); }
.code-line.hl-next .line-num  { color: var(--accent); }
.code-line.hl-skip .line-num  { color: var(--accent-r); }

.bp-area {
  width: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.exec-arrow {
  width: 14px;
  height: 14px;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}
.code-line.hl-exec .exec-arrow  { display: flex; color: var(--accent-g); }
.code-line.hl-next .exec-arrow  { display: flex; color: var(--accent); }
.code-line.hl-skip .exec-arrow  { display: flex; color: var(--accent-r); }

.line-code {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 24px;
  padding: 0 14px 0 4px;
  white-space: pre;
  color: var(--text);
}

/* ═══ CALL BADGE ═══ */
.call-badge {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  pointer-events: none;
}
.call-badge.exec { background: rgba(67,217,173,0.2); color: var(--accent-g); }
.call-badge.skip { background: rgba(244,112,103,0.2); color: var(--accent-r); }
.call-badge.next { background: rgba(91,156,246,0.2); color: var(--accent); }

/* ═══ INFO PANELS ═══ */
.info-panel {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.info-panel-header {
  height: 28px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
.info-panel-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text2);
  flex: 1;
}
.info-panel-toggle { font-size: 9px; color: var(--text3); }
.info-panel-body { padding: 8px 0; }

/* ═══ VARIABLES TABLE ═══ */
.var-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.var-table tr { border-bottom: 1px solid var(--border); }
.var-table tr:last-child { border-bottom: none; }
.var-table td { padding: 5px 12px; vertical-align: middle; }
.var-table td:first-child { color: var(--text3); width: 80px; font-size: 10px; }
.var-table td:nth-child(2) { color: var(--accent-y); font-weight: 600; }
.var-table td:nth-child(3) { color: var(--ty); font-size: 10px; }
.var-table td:last-child  { color: var(--text2); font-size: 10px; }

.var-changed {
  animation: flash-var 0.6s ease;
}
@keyframes flash-var {
  0% { background: rgba(67,217,173,0.3); }
  100% { background: transparent; }
}

/* ═══ MEMORY TABLE ═══ */
.mem-scroll { overflow-y: auto; max-height: 200px; }
.mem-scroll::-webkit-scrollbar { width: 3px; }
.mem-scroll::-webkit-scrollbar-thumb { background: var(--border2); }
.mem-tbl {
  width: 100%;
  border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
}
.mem-tbl thead th {
  background: var(--panel2);
  padding: 4px 10px;
  text-align: left;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--text3);
  text-transform: uppercase;
  position: sticky;
  top: 0;
}
.mem-tbl td { padding: 4px 10px; border-bottom: 1px solid var(--border); }
.mem-tbl tr:last-child td { border-bottom: none; }
.mem-addr-cell { color: var(--accent); }
.mem-name-cell { color: var(--accent-y); }
.mem-val-cell  { color: var(--accent-g); font-weight: 600; }
.mem-type-cell { color: var(--ty); font-size: 10px; }
.mem-val-changed { animation: flash-var 0.6s ease; }

/* ═══ MEMORY MAP (메모리맵 시각화) ═══ */
.mem-map-col {
  min-width: 200px;
  flex-shrink: 0;
  margin-bottom: 8px;
}
.mem-map-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.mem-map-hint { font-size: 8px; opacity: 0.8; }
.mem-map-grid {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mem-cell-row {
  display: grid;
  grid-template-columns: 70px 52px minmax(0, 1fr) 50px;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  transition: background 0.2s;
}
.mem-cell-row.highlight-row {
  background: rgba(67,217,173,0.15);
  border-color: var(--accent-g);
  box-shadow: 0 0 0 1px rgba(67,217,173,0.3);
}
.mem-cell-addr {
  color: var(--accent);
  font-size: 9px;
  word-break: break-all;
}
.mem-cell-name {
  color: var(--accent-y);
  font-weight: 600;
}
.mem-cell-bytes {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
}
.mem-byte {
  display: inline-block;
  min-width: 20px;
  padding: 1px 3px;
  background: var(--bg3);
  border-radius: 2px;
  color: var(--accent-o);
  font-size: 9px;
  text-align: center;
}
.mem-cell-row.highlight-row .mem-byte {
  background: rgba(67,217,173,0.2);
  color: var(--accent-g);
}
.mem-cell-val {
  color: var(--accent-g);
  font-weight: 600;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ═══ STACK VISUALIZER ═══ */
.stack-viz-wrap {
  padding: 10px 12px 8px;
  display: flex;
  gap: 14px;
  align-items: flex-end;
  min-height: 140px;
  overflow-x: auto;
  overflow-y: auto;
  max-height: 260px;
  position: relative;
}
.stack-viz-wrap::-webkit-scrollbar { width: 3px; height: 3px; }
.stack-viz-wrap::-webkit-scrollbar-thumb { background: var(--border2); }

.stack-col {
  display: flex;
  flex-direction: column-reverse;
  gap: 3px;
  min-width: 120px;
  flex-shrink: 0;
}
.stack-col-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 5px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  padding-bottom: 4px;
}

.stack-frame {
  width: 100%;
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid var(--border2);
  animation: frame-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
@keyframes frame-in {
  from { opacity: 0; transform: scaleY(0.3) translateY(8px); transform-origin: bottom; }
  to   { opacity: 1; transform: scaleY(1)   translateY(0);   transform-origin: bottom; }
}
.stack-frame.releasing {
  animation: frame-out 0.35s ease forwards;
  transform-origin: top;
}
@keyframes frame-out {
  from { opacity: 1; transform: scaleY(1);   max-height: 200px; }
  to   { opacity: 0; transform: scaleY(0.1); max-height: 0; }
}

.frame-header {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 4px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.frame-fn-main  { background: rgba(91,156,246,0.22);  color: var(--accent);   border-bottom: 1px solid rgba(91,156,246,0.3); }
.frame-fn-call  { background: rgba(183,125,255,0.22); color: var(--accent-p); border-bottom: 1px solid rgba(183,125,255,0.3);}
.frame-fn-free  { background: rgba(244,112,103,0.15); color: var(--accent-r); }

.frame-row {
  display: flex;
  align-items: center;
  padding: 3px 8px;
  border-top: 1px solid var(--border);
  gap: 5px;
  background: var(--panel);
  transition: background 0.2s;
}
.frame-row.highlight-row {
  background: rgba(67,217,173,0.12);
  animation: row-flash 0.6s ease;
}
@keyframes row-flash {
  0%   { background: rgba(67,217,173,0.4); }
  100% { background: rgba(67,217,173,0.12); }
}
.frame-row-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent-y);
  min-width: 36px;
}
.frame-row-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ty);
  min-width: 30px;
}
.frame-row-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--accent-g);
  font-weight: 600;
  flex: 1;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 80px;
}
.frame-row-bytes {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--accent-o);
  text-align: right;
  background: rgba(247,150,90,0.1);
  padding: 1px 4px;
  border-radius: 2px;
  flex-shrink: 0;
}
.frame-ret-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 8px;
  background: var(--bg);
  border-top: 1px dashed var(--border2);
}
.frame-ret-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text3); }
.frame-ret-val   { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--accent-r); }
.frame-addr-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 8px 3px;
  background: var(--panel2);
  border-top: 1px solid var(--border);
}
.frame-addr-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text3); }
.frame-addr-val   { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--accent); }
.frame-total-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 8px;
  background: rgba(247,150,90,0.06);
  border-top: 1px solid var(--border);
}
.frame-total-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text3); }
.frame-total-val   { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--accent-o); font-weight: 700; }

/* released banner */
.released-banner {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--accent-r);
  background: rgba(244,112,103,0.08);
  border: 1px dashed rgba(244,112,103,0.3);
  border-radius: 4px;
  padding: 4px 8px;
  text-align: center;
  letter-spacing: 0.5px;
  animation: frame-in 0.3s ease;
}

/* heap block */
.heap-block {
  width: 100%;
  border-radius: 5px;
  border: 1px solid rgba(247,150,90,0.45);
  background: rgba(247,150,90,0.06);
  overflow: hidden;
  animation: frame-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.heap-block.freed {
  border-color: rgba(244,112,103,0.35);
  background: rgba(244,112,103,0.04);
  opacity: 0.7;
}
.heap-header {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  padding: 4px 8px;
  background: rgba(247,150,90,0.18);
  color: var(--accent-o);
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid rgba(247,150,90,0.2);
}
.heap-header.freed-header {
  background: rgba(244,112,103,0.18);
  color: var(--accent-r);
}
.heap-row {
  display: flex;
  align-items: center;
  padding: 3px 8px;
  border-top: 1px solid var(--border);
  gap: 5px;
  background: var(--panel);
}
.heap-row-name  { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-o); min-width: 40px; }
.heap-row-val   { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-g); font-weight:600; flex:1; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80px; }
.heap-row-bytes { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--accent-o); background:rgba(247,150,90,0.1); padding:1px 4px; border-radius:2px; flex-shrink:0; }
.heap-addr-row {
  padding: 2px 8px 3px;
  background: var(--panel2);
  border-top: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--accent);
}

/* pointer connector */
.ptr-connector {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
.ptr-line {
  width: 24px;
  height: 2px;
  background: var(--accent);
  position: relative;
}
.ptr-line::after {
  content: '▶';
  position: absolute;
  right: -8px;
  top: -6px;
  font-size: 10px;
  color: var(--accent);
}
.ptr-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 0.5px;
}
.ptr-dangling .ptr-line { background: var(--accent-r); }
.ptr-dangling .ptr-line::after { color: var(--accent-r); }
.ptr-dangling .ptr-label { color: var(--accent-r); }

/* viz empty state */
.viz-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 20px 12px;
  gap: 8px;
}
.viz-empty-icon { font-size: 22px; }
.viz-empty-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-g); }
.viz-empty-sub  { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text3); text-align: center; line-height: 1.6; }

/* ═══ CALL STACK ═══ */
.callstack-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.callstack-item.active { background: rgba(91,156,246,0.07); }
.cs-num { color: var(--text3); width: 16px; text-align: right; font-size: 10px; }
.cs-fn  { color: var(--fn); }
.cs-line { color: var(--text3); font-size: 10px; margin-left: auto; }

/* ═══ OUTPUT ═══ */
.output-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--accent-g);
  line-height: 1.8;
  min-height: 60px;
}
.output-scroll::-webkit-scrollbar { width: 3px; }
.output-scroll::-webkit-scrollbar-thumb { background: var(--border2); }
.output-line { display: block; }
.output-dim { color: var(--text3); }
.output-skip { color: var(--accent-r); text-decoration: line-through; opacity: 0.5; font-size: 10px; }

/* ═══ CONTROL BAR ═══ */
.control-bar {
  height: 48px;
  background: var(--sidebar);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
}
.ctrl-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: var(--panel2);
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.ctrl-btn:hover { background: var(--panel); color: var(--text); border-color: var(--accent); }
.ctrl-btn:active { transform: scale(0.97); }
.ctrl-btn.primary {
  background: rgba(91,156,246,0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.ctrl-btn.primary:hover { background: rgba(91,156,246,0.25); }
.ctrl-btn.success {
  background: rgba(67,217,173,0.12);
  border-color: var(--accent-g);
  color: var(--accent-g);
}
.ctrl-btn.success:hover { background: rgba(67,217,173,0.22); }
.ctrl-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
}
.ctrl-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
.step-counter {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.5px;
}
.step-counter span { color: var(--accent); }

/* ═══ EXPLAIN BOX ═══ */
.explain-box {
  margin: 0 12px 8px;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 5px;
  font-size: 11.5px;
  color: var(--text2);
  line-height: 1.6;
  min-height: 38px;
}
.explain-box b { color: var(--accent-y); }
.explain-box .e-exec { color: var(--accent-g); }
.explain-box .e-skip { color: var(--accent-r); }
.explain-box .e-cond { color: var(--accent-p); }

/* ═══ SYNTAX ═══ */
.kw { color: var(--kw); font-weight: 600; }
.ty { color: var(--ty); }
.st { color: var(--st); }
.nm { color: var(--nm); }
.cm { color: var(--cm); font-style: italic; }

.vr { color: var(--vr); }
.pp { color: var(--pp); }
.lbl { color: var(--accent-y); font-weight: 700; }

/* ═══ CONCEPT CARD ═══ */
.concept-header {
  padding: 10px 12px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;

}
.concept-body {
  padding: 0 12px 10px;

  color: var(--text2);

}
.concept-body b { color: var(--accent-y); }
.concept-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--kw);
  background: var(--panel2);
  padding: 1px 5px;
  border-radius: 3px;
}
.concept-body .g { color: var(--accent-g); }
.concept-body .r { color: var(--accent-r); }

/* ═══ CONDITION BADGE ═══ */
.cond-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;

.cond-false { background: rgba(244,112,103,0.15); color: var(--accent-r); }

/* ═══ MISC ═══ */
.flex-1 { flex: 1; }

// ══════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════
function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function $(id) {
  return document.getElementById(id);
}

// ══════════════════════════════════════════════════════════
//  RENDER OUTPUT (공통)
// ══════════════════════════════════════════════════════════
function renderOutput(lines, emptyMsg) {
  const area = $(IDS.outputArea);
  if (!lines || lines.length === 0) {
    area.innerHTML = `<span class="output-dim">${emptyMsg || '// 실행 결과가 여기 표시됩니다'}</span>`;
    return;
  }
  area.innerHTML = lines.map((l, i) =>
    `<span class="output-line">${i === lines.length - 1 ? '<span style="color:var(--accent-y)">▶</span> ' : '  '}${escHtml(l.text)}</span>`
  ).join('\n');
  area.scrollTop = area.scrollHeight;
}

// ══════════════════════════════════════════════════════════
//  RENDER CODE
// ══════════════════════════════════════════════════════════
function renderCode(topic, activeLineId, type) {
  const t = TOPICS[topic];
  const area = $(IDS.codeArea);
  area.innerHTML = '';
  t.code.forEach((line, idx) => {
    const div = document.createElement('div');
    div.className = 'code-line';
    div.id = 'codeline_' + (line.id || 'blank_' + idx);

    let cls = '';
    if (line.id && line.id === activeLineId) {
      if (type === 'exec') cls = 'hl-exec';
      else if (type === 'skip') cls = 'hl-skip';
      else cls = 'hl-next';
    }
    if (cls) div.classList.add(cls);

    const arrow = type === 'exec' ? '▶' : type === 'skip' ? '✕' : '→';

    div.innerHTML = `
      <div class="line-gutter">
        <span class="line-num">${idx + 1}</span>
        <div class="exec-arrow">${arrow}</div>
      </div>
      <div class="line-code">${line.text}</div>
    `;
    area.appendChild(div);
  });

  const activeEl = activeLineId ? document.getElementById('codeline_' + activeLineId) : null;
  if (activeEl) activeEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════════
//  RENDER MEMORY TABLE
// ══════════════════════════════════════════════════════════
function renderMemTable(topic, newVars) {
  const t = TOPICS[topic];
  const tbody = $(IDS.memTable);
  const addrs = t.baseAddr || {};
  const varTypes = t.varTypes || {};

  if (newVars) {
    for (const k in newVars) {
      const old = state.varState[k];
      state.varState[k] = { val: newVars[k], changed: (old === undefined || old.val !== newVars[k]) };
    }
  }

  let html = '';
  const entries = Object.keys(state.varState);
  if (entries.length === 0) {
    html = `<tr><td colspan="4" style="color:var(--text3);padding:8px 10px;font-size:11px">— 아직 변수 없음 —</td></tr>`;
  } else {
    entries.forEach(k => {
      const v = state.varState[k];
      const addr = addrs[k] || '0x7fff????';
      const type = varTypes[k] || 'int';
      const cls = v.changed ? 'mem-val-changed' : '';
      html += `<tr class="${cls}">
        <td class="mem-addr-cell">${addr}</td>
        <td class="mem-name-cell">${k}</td>
        <td class="mem-type-cell">${type}</td>
        <td class="mem-val-cell">${v.val}</td>
      </tr>`;
      v.changed = false;
    });
  }
  tbody.innerHTML = html;
}

// ══════════════════════════════════════════════════════════
//  RENDER OUTPUT (append / clear)
// ══════════════════════════════════════════════════════════
function appendOutput(text) {
  if (!text) return;
  state.outputLines.push({ text });
  renderOutput(state.outputLines);
}

function clearOutput() {
  state.outputLines = [];
  renderOutput([], '// 실행 결과가 여기 표시됩니다');
}

// ══════════════════════════════════════════════════════════
//  MEMORY MAP: 값 → 헥스 바이트 (리틀 엔디안)
// ══════════════════════════════════════════════════════════
function valToHexBytes(val, type, bytes) {
  const b = bytes || (type && type.includes('*') ? 8 : type === 'double' ? 8 : 4);
  const empty = () => Array(b).fill('??');
  if (val === '???' || val === null || val === undefined) return empty();
  if (type === 'int' || type === 'int*') {
    if (type.includes('*')) {
      if (typeof val === 'string' && val.startsWith('0x')) {
        const hex = val.replace('0x','').replace(/[^0-9a-fA-F]/g,'').padStart(16,'0').slice(-16);
        const pairs = [];
        for (let i = hex.length - 2; i >= 0; i -= 2) pairs.push(hex.slice(i, i + 2));
        return pairs.length ? pairs : empty();
      }
      return empty();
    }
    const n = typeof val === 'string' ? parseInt(val, 10) : val;
    if (isNaN(n)) return empty();
    const hex = (n >>> 0).toString(16).padStart(8, '0');
    return [hex.slice(6,8), hex.slice(4,6), hex.slice(2,4), hex.slice(0,2)];
  }
  if (type === 'double') {
    const f = parseFloat(val);
    if (isNaN(f)) return empty();
    const buf = new ArrayBuffer(8);
    new DataView(buf).setFloat64(0, f, true);
    return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, '0'));
  }
  return empty();
}

// ══════════════════════════════════════════════════════════
//  VARSTATE → MEMVIZ (memViz 없는 스텝에서 변수 할당 시 메모리 맵 표시)
// ══════════════════════════════════════════════════════════
function buildMemVizFromVarState(topic, varState) {
  const t = topic;
  if (!t || !t.varTypes || !varState || Object.keys(varState).length === 0) return null;
  const addrs = (t._autoBaseAddr || t.baseAddr || {});
  const varNames = Object.keys(t.varTypes);
  const vars = varNames
    .filter(name => {
      const v = varState[name];
      const val = (v && typeof v === 'object' && 'val' in v) ? v.val : v;
      return v !== undefined && val !== '—';
    })
    .map(name => {
      const v = varState[name];
      const val = (v && typeof v === 'object' && 'val' in v) ? v.val : v;
      const type = t.varTypes[name] || 'int';
      const bytes = getTypeBytes(type);
      const addr = addrs[name] || '0x7fff????';
      return { name, type, bytes, val, addr, highlight: false };
    });
  if (vars.length === 0) return null;
  const totalBytes = vars.reduce((a, v) => a + v.bytes, 0) + 16;
  return {
    stack: [{ fn: 'main', color: 'main', vars, retAddr: '0x400640' }],
    heap: [],
    totalBytes,
  };
}

// ══════════════════════════════════════════════════════════
//  STACK VISUALIZER RENDERER

function renderStackViz(memViz) {
  const area = $(IDS.stackVizArea);
  const byteLabel = $(IDS.memVizByteLabel);

  if (!memViz) {
    area.innerHTML = '<span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--text3);padding:10px 12px;display:block">— Step을 진행하면 메모리 상태가 표시됩니다 —</span>';
    byteLabel.textContent = '';
    return;
  }

  const ptrLinks = memViz.ptrLinks || memViz.pointers || [];
  const { stack = [], heap = [], totalBytes = 0, released } = memViz;
  byteLabel.textContent = `${totalBytes}B`;

  let html = '';

  // ── 메모리맵 시각화 (스택 변수) ─────────────────────────
  const allVars = stack.slice().reverse().flatMap(f => f.vars.map(v => ({ ...v, fn: f.fn })));
  if (allVars.length > 0) {
    html += `<div class="mem-map-col">
      <div class="mem-map-label">🗺 메모리 맵 <span class="mem-map-hint">(↑ 최신 위)</span></div>
      <div class="mem-map-grid">`;

    allVars.forEach(v => {
      const hexBytes = valToHexBytes(v.val, v.type, v.bytes);
      const hlCls = v.highlight ? 'mem-cell-row highlight-row' : 'mem-cell-row';
      html += `<div class="${hlCls}">
        <div class="mem-cell-addr">${escHtml(v.addr)}</div>
        <div class="mem-cell-name">${escHtml(v.name)}</div>
        <div class="mem-cell-bytes">`;
      hexBytes.forEach((h, i) => {
        html += `<span class="mem-byte" title="${escHtml(v.name)} byte ${i}">${escHtml(h)}</span>`;
      });
      html += `</div>
        <div class="mem-cell-val">${escHtml(String(v.val))}</div>
      </div>`;
    });

    html += `</div></div>`;
  }

  // ── STACK COLUMN ──
  html += `<div class="stack-col">
    <div class="stack-col-label">📦 STACK  (↓성장)</div>`;

  if (stack.length === 0 && heap.length === 0) {
    // empty state handled below
  } else if (stack.length === 0) {
    html += `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);padding:8px;text-align:center">비어있음</div>`;
  } else {
    stack.slice().reverse().forEach(frame => {
      const headerCls = `frame-fn-${frame.color}`;
      const varBytes = frame.vars.reduce((a, v) => a + v.bytes, 0);
      const totalFrameBytes = varBytes + 8 + 8;

      html += `<div class="stack-frame">
        <div class="frame-header ${headerCls}">
          <span>${escHtml(frame.fn)}()</span>
          <span style="font-size:9px;opacity:0.85">${totalFrameBytes}B</span>
        </div>`;

      frame.vars.forEach(v => {
        const hlCls = v.highlight ? 'highlight-row' : '';
        html += `<div class="frame-row ${hlCls}">
          <span class="frame-row-name">${escHtml(v.name)}</span>
          <span class="frame-row-type">${escHtml(v.type)}</span>
          <span class="frame-row-val" title="${escHtml(String(v.val))}">${escHtml(String(v.val))}</span>
          <span class="frame-row-bytes">${v.bytes}B</span>
        </div>`;
      });

      if (frame.vars.length > 0) {
        const lo = frame.vars[frame.vars.length - 1].addr;
        const hi = frame.vars[0].addr;
        html += `<div class="frame-addr-row">
          <span class="frame-addr-label">addr</span>
          <span class="frame-addr-val">${lo !== hi ? lo + '~' + hi.slice(-4) : lo}</span>
        </div>`;
      }

      html += `<div class="frame-ret-row">
        <span class="frame-ret-label">ret →</span>
        <span class="frame-ret-val">${escHtml(frame.retAddr)}</span>
      </div>`;

      html += `<div class="frame-total-row">
        <span class="frame-total-label">frame total</span>
        <span class="frame-total-val">${totalFrameBytes}B</span>
      </div>
      </div>`;
    });
  }

  html += `</div>`;

  // ── POINTER CONNECTORS ──
  if (heap.length > 0 && ptrLinks.length > 0) {
    html += `<div class="ptr-connector">`;
    ptrLinks.forEach(pl => {
      const isDangling = pl.dangling || false;
      html += `<div class="${isDangling ? 'ptr-dangling' : ''}" style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
        <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:${isDangling ? 'var(--accent-r)' : 'var(--accent)'}">
          ${escHtml(pl.from)}
        </span>
        <div class="ptr-line"></div>
      </div>`;
    });
    html += `</div>`;
  } else if (heap.length > 0) {
    html += `<div style="display:flex;align-items:center;padding:0 6px">
      <div style="width:16px;height:1px;background:var(--border2)"></div>
    </div>`;
  }

  // ── HEAP COLUMN ──
  if (heap.length > 0) {
    html += `<div class="stack-col" style="min-width:130px">
      <div class="stack-col-label">🧱 HEAP  (↑성장)</div>`;

    heap.forEach(blk => {
      const headerCls = blk.freed ? 'freed-header' : '';
      const blockCls  = blk.freed ? 'heap-block freed' : 'heap-block';
      html += `<div class="${blockCls}">
        <div class="heap-header ${headerCls}">
          <span>${escHtml(blk.label)}</span>
          <span>${blk.bytes}B</span>
        </div>`;

      blk.items.forEach(it => {
        html += `<div class="heap-row">
          <span class="heap-row-name">${escHtml(it.name)}</span>
          <span class="heap-row-val" title="${escHtml(String(it.val))}">${escHtml(String(it.val))}</span>
          <span class="heap-row-bytes">${it.bytes}B</span>
        </div>`;
      });

      html += `<div class="heap-addr-row">${escHtml(blk.addr)}</div>
      </div>`;
    });

    html += `</div>`;
  }

  // ── RELEASED NOTICE ──
  if (released) {
    html += `<div style="position:absolute;bottom:6px;left:10px;right:10px">
      <div class="released-banner">⬇ ${escHtml(released)}</div>
    </div>`;
  }

  // ── EMPTY STATE ──
  if (stack.length === 0 && heap.length === 0) {
    html = `<div class="viz-empty">
      <span class="viz-empty-icon">✅</span>
      <span class="viz-empty-text">모든 메모리 해제됨</span>
      ${released ? `<span class="viz-empty-sub">${escHtml(released)}</span>` : ''}
    </div>`;
  }

  area.style.position = 'relative';
  area.innerHTML = html;
}

// ══════════════════════════════════════════════════════════
//  STEP LOGIC
// ══════════════════════════════════════════════════════════
function updateUI() {
  const t = TOPICS[state.currentTopic];
  const total = t.steps.length;
  $(IDS.stepNum).textContent = state.stepIndex;
  $(IDS.stepTotal).textContent = total;
  $(IDS.topBadge).textContent = `STEP ${state.stepIndex} / ${total}`;
  $(IDS.btnPrev).disabled = state.stepIndex === 0;
  $(IDS.btnStep).disabled = state.stepIndex >= total;

  if (state.stepIndex === 0) {
    state.lastMemViz = null;
    renderCode(state.currentTopic, null, null);
    $(IDS.explainBox).innerHTML = '▶ Step 버튼을 눌러 실행을 시작하세요.';
    $(IDS.condBadge).innerHTML = '';
    renderMemTable(state.currentTopic, null);
    renderStackViz(null);
    return;
  }

  const step = t.steps[state.stepIndex - 1];
  renderCode(state.currentTopic, step.line, step.type);
  $(IDS.explainBox).innerHTML = step.explain || '';

  if (step.cond !== undefined) {
    $(IDS.condBadge).innerHTML = step.cond
      ? `<span class="cond-badge cond-true">✓ TRUE</span>`
      : `<span class="cond-badge cond-false">✗ FALSE</span>`;
  } else {
    $(IDS.condBadge).innerHTML = '';
  }

  renderMemTable(state.currentTopic, step.vars || null);
  if (step.memViz !== undefined) {
    const memViz = step.memViz || null;
    const memChanged = !_memVizEqual(memViz, state.lastMemViz);
    if (memChanged) {
      state.lastMemViz = memViz;
      renderStackViz(memViz);
    }
    if (memViz && memViz.stack && memViz.stack.length === 0 && (!memViz.heap || memViz.heap.length === 0)) {
      state.varState = {};
      renderMemTable(state.currentTopic, null);
    }
  } else {
    const synthetic = buildMemVizFromVarState(t, state.varState);
    if (synthetic) {
      state.lastMemViz = synthetic;
      renderStackViz(synthetic);
    } else if (state.lastMemViz) {
      renderStackViz(state.lastMemViz);
    }
  }
}

function _memVizEqual(a, b) {
  if (a === b) return true;
  if (!a || !b) return !a && !b;
  try {
    return JSON.stringify(a) === JSON.stringify(b);
  } catch (_) { return false; }
}

function stepForward() {
  const t = TOPICS[state.currentTopic];
  if (state.stepIndex >= t.steps.length) return;
  const step = t.steps[state.stepIndex];
  state.stepIndex++;
  if (step.output) appendOutput(step.output);
  updateUI();
}

function stepBack() {
  if (state.stepIndex <= 0) return;
  state.stepIndex--;

  state.outputLines = [];
  const t = TOPICS[state.currentTopic];
  for (let i = 0; i < state.stepIndex; i++) {
    if (t.steps[i].output) state.outputLines.push({ text: t.steps[i].output });
  }
  renderOutput(state.outputLines, '// 실행 결과가 여기 표시됩니다');

  state.varState = {};
  let lastMemViz = null;
  for (let i = 0; i < state.stepIndex; i++) {
    if (t.steps[i].vars) {
      for (const k in t.steps[i].vars) state.varState[k] = { val: t.steps[i].vars[k], changed: false };
    }
    if (t.steps[i].memViz) lastMemViz = t.steps[i].memViz;
  }
  state.lastMemViz = lastMemViz;
  const toShow = lastMemViz || buildMemVizFromVarState(t, state.varState);
  renderStackViz(toShow);
  updateUI();
}

function runAll() {
  const t = TOPICS[state.currentTopic];
  let lastMemViz = null;
  while (state.stepIndex < t.steps.length) {
    const step = t.steps[state.stepIndex];
    state.stepIndex++;
    if (step.output) state.outputLines.push({ text: step.output });
    if (step.vars) {
      for (const k in step.vars) state.varState[k] = { val: step.vars[k], changed: false };
    }
    if (step.memViz) lastMemViz = step.memViz;
  }
  renderOutput(state.outputLines, '// 출력 없음');
  const toShow = lastMemViz || buildMemVizFromVarState(t, state.varState);
  state.lastMemViz = toShow || lastMemViz;
  if (toShow) renderStackViz(toShow);
  if (lastMemViz && lastMemViz.stack && lastMemViz.stack.length === 0 && (!lastMemViz.heap || lastMemViz.heap.length === 0)) {
    state.varState = {};
    renderMemTable(state.currentTopic, null);
  }
  updateUI();
}

function resetDebug() {
  state.stepIndex = 0;
  state.varState = {};
  state.lastMemViz = null;
  clearOutput();
  updateUI();
}

// ══════════════════════════════════════════════════════════
//  SIDEBAR (동적 생성)
// ══════════════════════════════════════════════════════════
function renderSidebar() {
  const container = $(IDS.sidebarScroll);
  if (!container) return;

  const tagStyles = {
    accent: 'background:rgba(91,156,246,0.1);color:var(--accent)',
    purple: 'background:rgba(183,125,255,0.1);color:var(--accent-p)',
    red: 'background:rgba(244,112,103,0.1);color:var(--accent-r)',
  };

  let currentGroup = '';
  let html = '';

  TOPIC_META.forEach(item => {
    if (item.group !== currentGroup) {
      if (currentGroup) html += '</div>';
      currentGroup = item.group;
      html += `<div class="sidebar-group"><div class="sidebar-group-label">${currentGroup}</div>`;
    }

    if (item.isSub) {
      const tagStyle = tagStyles[item.tagStyle] || tagStyles.accent;
      html += `<div class="sidebar-subitem" data-topic="${item.key}" onclick="selectTopic('${item.key}')">
        <div class="sidebar-subitem-name">${escHtml(item.label)}</div>
        <span class="sidebar-subitem-tag" style="${tagStyle}">${escHtml(item.tag || '')}</span>
      </div>`;
    } else {
      html += `<div class="sidebar-item" data-topic="${item.key}" onclick="selectTopic('${item.key}')">
        <span class="sidebar-item-icon">${item.icon || '•'}</span>
        <div class="sidebar-item-info">
          <div class="sidebar-item-name">${escHtml(item.label)}</div>
          <div class="sidebar-item-sub">${escHtml(item.sub || '')}</div>
        </div>
        <div class="sidebar-item-dot"></div>
      </div>`;
    }
  });

  if (currentGroup) html += '</div>';
  container.innerHTML = html;
}

// ══════════════════════════════════════════════════════════
//  TOPIC SELECT
// ══════════════════════════════════════════════════════════
function selectTopic(topicKey) {
  if (!TOPICS[topicKey]) return;
  state.currentTopic = topicKey;
  state.stepIndex = 0;
  state.varState = {};
  state.outputLines = [];
  state.lastMemViz = null;

  document.querySelectorAll('.sidebar-item, .sidebar-subitem').forEach(el => {
    el.classList.remove('active');
    if (el.dataset.topic === topicKey) el.classList.add('active');
  });

  const t = TOPICS[topicKey];
  $(IDS.editorTitle).textContent = t.title;
  $(IDS.tabCodeName).textContent = t.name;
  $(IDS.topTitle).textContent = t.name;
  $(IDS.conceptBody).innerHTML = t.concept;

  clearOutput();
  renderStackViz(null);
  updateUI();
}

// ══════════════════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════════════════
const THEME_KEY = 'cdebugger-theme';

function getTheme() {
  return localStorage.getItem(THEME_KEY) || 'dark';
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(THEME_KEY, theme);
  const icon = $(IDS.themeIcon);
  const label = $(IDS.themeLabel);
  if (icon && label) {
    icon.textContent = theme === 'light' ? '☀️' : '🌙';
    label.textContent = theme === 'light' ? '라이트' : '다크';
  }
}

function toggleTheme() {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  setTheme(next);
}

// ══════════════════════════════════════════════════════════
//  RESIZE (드래그로 패널 크기 조절)
// ══════════════════════════════════════════════════════════
const RESIZE_KEYS = { rightPane: 'cdebugger-right-pane-width', panelHeights: 'cdebugger-panel-heights' };

function initResize() {
  const rightPane = document.getElementById('rightPane');
  const resizerV = document.getElementById('resizerV');
  if (!rightPane || !resizerV) return;

  let rpWidth = parseInt(localStorage.getItem(RESIZE_KEYS.rightPane) || '380', 10);
  rpWidth = Math.max(280, Math.min(600, rpWidth));
  rightPane.style.setProperty('--right-pane-width', rpWidth + 'px');

  resizerV.addEventListener('mousedown', e => {
    e.preventDefault();
    resizerV.classList.add('active');
    const startX = e.clientX;
    const startW = rightPane.offsetWidth;
    function onMove(e) {
      const dx = startX - e.clientX;
      let w = Math.max(280, Math.min(600, startW + dx));
      rightPane.style.setProperty('--right-pane-width', w + 'px');
    }
    function onUp() {
      resizerV.classList.remove('active');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      localStorage.setItem(RESIZE_KEYS.rightPane, String(rightPane.offsetWidth));
    }
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  const saved = JSON.parse(localStorage.getItem(RESIZE_KEYS.panelHeights) || '{}');
  const panels = ['panelConcept', 'panelExplain', 'panelMemViz', 'panelVars'];
  panels.forEach(id => {
    const panel = document.getElementById(id);
    if (!panel) return;
    const def = parseInt(panel.dataset.default || '120', 10);
    const min = parseInt(panel.dataset.min || '60', 10);
    let h = saved[id] || def;
    h = Math.max(min, h);
    panel.style.height = h + 'px';
    panel.style.minHeight = min + 'px';
    panel.style.flexShrink = '0';
  });

  document.querySelectorAll('.resizer-h[data-resize]').forEach(resizer => {
    resizer.addEventListener('mousedown', e => {
      e.preventDefault();
      resizer.classList.add('active');
      const panelId = resizer.dataset.resize;
      const panel = document.getElementById(panelId);
      if (!panel) return;
      const min = parseInt(panel.dataset.min || '60', 10);
      const startY = e.clientY;
      const startH = panel.offsetHeight;
      function onMove(e) {
        const dy = e.clientY - startY;
        panel.style.height = Math.max(min, startH + dy) + 'px';
      }
      function onUp() {
        resizer.classList.remove('active');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        const saved = {};
        panels.forEach(pid => {
          const p = document.getElementById(pid);
          if (p) saved[pid] = p.offsetHeight;
        });
        localStorage.setItem(RESIZE_KEYS.panelHeights, JSON.stringify(saved));
      }
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'row-resize';
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
setTheme(getTheme());
initResize();
renderSidebar();
selectTopic('if_basic');

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'n') stepForward();
  if (e.key === 'ArrowLeft'  || e.key === 'p') stepBack();
  if (e.key === 'r') resetDebug();
});

</script>
